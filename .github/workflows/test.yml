name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
      - name: Install Windows timezone data
        if: runner.os == 'Windows'
        run: python -m pip install tzdata
      - name: Compile
        run: python -m py_compile scripts/kaspi.py
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: CLI smoke test
        run: python scripts/kaspi.py --help
